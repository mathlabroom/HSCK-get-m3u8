name: "E2 Bouquet Sync to Repo"

on:
  push:
    paths:
      - 'VideoResults/**/*.m3u8'
  workflow_dispatch:

jobs:
  convert_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate E2 Bouquets
        run: |
          node to_bouquet.js

      - name: Commit and Push .tv files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制添加生成的 .tv 文件，即使它们在 .gitignore 里
          git add E2_Bouquets/*.tv
          
          # 检查是否有文件变化，有才提交
          if git diff --staged --quiet; then
            echo "没有新变化，跳过提交。"
          else
            git commit -m "自动更新 E2 花束文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
