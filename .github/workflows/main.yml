name: "E2 Bouquet Auto Converter"

on:
  push:
    paths:
      - 'VideoResults/**/*.m3u8'  # 只有当你上传了新的 m3u8 时才触发
  workflow_dispatch:              # 允许手动点按钮触发

jobs:
  convert_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate E2 Bouquets
        run: |
          node to_bouquet.js

      - name: Delete old release
        run: |
          # 增加删除重试逻辑并强制休眠
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          echo "等待 GitHub 刷新标签状态..."
          sleep 10 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Enigma2 Bouquets"
          files: |
            E2_Bouquets/*.tv
            VideoResults/**/*.m3u8
          body: |
            自动更新完成。
            更新时间: ${{ github.event.head_commit.timestamp }}
          prerelease: false
          make_latest: true
          # 修正参数名如下：
          overwrite_files: true
          # 防止因为某个文件找不到而崩溃
          fail_on_unmatched_files: false 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
