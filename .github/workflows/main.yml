name: "E2 Bouquet Auto Converter"

on:
  push:
    paths:
      - 'VideoResults/**/*.m3u8'  # 只有当你上传了新的 m3u8 时才触发
  workflow_dispatch:              # 允许手动点按钮触发

jobs:
  convert_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate E2 Bouquets
        run: |
          node to_bouquet.js

      - name: Delete old release
        run: |
          # 增加删除重试逻辑并强制休眠
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          echo "等待 GitHub 刷新标签状态..."
          sleep 10 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Release (CLI Mode)
        run: |
          # 1. 如果已存在 latest release，先删除它以便重新发布干净的资源
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          
          # 给服务器一点反应时间
          sleep 5
          
          # 2. 创建全新的 Release
          gh release create latest --title "Latest Enigma2 Bouquets" --notes "自动生成：包含独立的 .tv 分类文件和 m3u8 清单"
          
          # 3. 逐个上传 E2_Bouquets 目录下的所有 .tv 文件
          # 这样能确保每个文件都以原始文件名出现在 Assets 里
          for file in E2_Bouquets/*.tv; do
            if [ -f "$file" ]; then
              echo "正在上传: $file"
              gh release upload latest "$file" --clobber
            fi
          done

          # 4. 逐个上传 VideoResults 下各子目录中的 m3u8 文件
          # 使用 find 命令找出所有清单文件并上传
          find VideoResults -name "*_清单.m3u8" | while read -r m3u8_file; do
            echo "正在上传清单: $m3u8_file"
            gh release upload latest "$m3u8_file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
