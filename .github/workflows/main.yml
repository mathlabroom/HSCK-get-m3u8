name: "E2 Bouquet Auto Converter"

on:
  push:
    paths:
      - 'VideoResults/**/*.m3u8'  # 只有当你上传了新的 m3u8 时才触发
  workflow_dispatch:              # 允许手动点按钮触发

jobs:
  convert_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate E2 Bouquets
        run: |
          node to_bouquet.js

      - name: Delete old release
        run: |
          # 增加删除重试逻辑并强制休眠
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          echo "等待 GitHub 刷新标签状态..."
          sleep 10 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Release (CLI Mode)
        run: |
          # 1. 创建 Release (如果已存在则忽略错误)
          gh release create latest --title "Latest Enigma2 Bouquets" --notes "自动生成：分类清单" || echo "Release exists"

          # 2. 上传 E2_Bouquets 目录下的 .tv 文件
          # 使用 (cd ...) 括号语法可以在不改变当前 shell 路径的情况下进入目录操作
          (
            cd E2_Bouquets
            for file in *.tv; do
              [ -e "$file" ] || continue
              echo "正在上传花束文件: $file"
              gh release upload latest "$file" --clobber
            done
          )

          # 3. 递归寻找所有子目录下的 m3u8 清单并上传
          # 使用 find 并配合 basename，确保上传到 GitHub 的名字不带路径前缀
          find VideoResults -name "*_清单.m3u8" | while read -r m3u8_path; do
            filename=$(basename "$m3u8_path")
            echo "正在处理清单文件: $filename (路径: $m3u8_path)"
            # 这里的技巧是：把文件传给 gh 的标准输入，并用 --name 指定 GitHub 上的显示名称
            gh release upload latest "$m3u8_path" --clobber --name "$filename"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
