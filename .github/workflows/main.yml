name: "E2 Bouquet Auto Converter"

on:
  push:
    paths:
      - 'VideoResults/**/*.m3u8'  # 只有当你上传了新的 m3u8 时才触发
  workflow_dispatch:              # 允许手动点按钮触发

jobs:
  convert_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate E2 Bouquets
        run: |
          node to_bouquet.js

      - name: Delete old release
        run: |
          # 增加删除重试逻辑并强制休眠
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          echo "等待 GitHub 刷新标签状态..."
          sleep 10 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Release (CLI Mode)
        run: |
          # 1. 清理旧版本
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          sleep 5
          
          # 2. 创建新版本
          gh release create latest --title "Latest Enigma2 Bouquets" --notes "自动生成：分类清单"

          # 3. 上传 .tv 文件
          # 重点：先 cd 进去，这样 gh 拿到的文件名就是干净的
          cd E2_Bouquets
          for file in *.tv; do
            if [ -f "$file" ]; then
              echo "正在上传: $file"
              gh release upload latest "$file" --clobber --repo ${{ github.repository }}
            fi
          done
          cd ..

          # 4. 上传 m3u8 文件
          # 同样处理：利用 find 找到文件后，在当前目录执行上传
          find VideoResults -name "*_清单.m3u8" | while read -r m3u8_file; do
            echo "正在上传清单: $m3u8_file"
            # 这里直接传路径，gh 通常能处理好带下划线的中文名
            gh release upload latest "$m3u8_file" --clobber --repo ${{ github.repository }}
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
