name: "E2 Bouquet Auto Converter"

on:
  push:
    paths:
      - 'VideoResults/**/*.m3u8'  # 只有当你上传了新的 m3u8 时才触发
  workflow_dispatch:              # 允许手动点按钮触发

jobs:
  convert_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate E2 Bouquets
        run: |
          node to_bouquet.js

      - name: Delete old release
        run: |
          # 增加删除重试逻辑并强制休眠
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          echo "等待 GitHub 刷新标签状态..."
          sleep 10 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Release (CLI Mode)
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          sleep 5
          gh release create latest --title "Latest Enigma2 Bouquets" --notes "自动生成：分类清单"

          # 关键修改：显式指定上传的文件名
          for file in E2_Bouquets/*.tv; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "正在上传: $filename"
              # 使用引号包裹路径，防止中文空格失效
              gh release upload latest "$file" --name "$filename" --clobber
            fi
          done

          # 同样处理 m3u8
          find VideoResults -name "*_清单.m3u8" | while read -r m3u8_file; do
            filename=$(basename "$m3u8_file")
            echo "正在上传清单: $filename"
            gh release upload latest "$m3u8_file" --name "$filename" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
